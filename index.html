<!DOCTYPE html>
<html>
<head>
    <title>Marine Documents - Odbiór</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; width: 100%; text-align: center; }
        .status { padding: 12px; border-radius: 8px; margin: 16px 0; background: #e7f3ff; color: #007bff; font-weight: bold; }
        .error { background: #fff1f0; color: #d32f2f; padding: 12px; border-radius: 8px; border: 1px solid #ffa39e; font-size: 13px; }
        img { max-width: 100%; border-radius: 12px; margin-top: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="card">
        <h2>Marine Documents</h2>
        <div id="status" class="status">Ładowanie...</div>
        <div id="content"></div>
    </div>

<script>
    function safeAtob(s) {
        if(!s) return "";
        s = s.replace(/-/g, '+').replace(/_/g, '/');
        s = s.replace(/[^A-Za-z0-9+/]/g, "");
        while (s.length % 4) s += '=';
        return atob(s);
    }

    async function start() {
        const status = document.getElementById('status');
        try {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const k = params.get('k');
            const f = params.get('f');

            if (!k || !f) throw new Error("Link wygasł lub jest niepoprawny.");

            const keyRaw = Uint8Array.from(safeAtob(k), c => c.charCodeAt(0));
            const key = await crypto.subtle.importKey("raw", keyRaw, {name: "AES-GCM"}, false, ["decrypt"]);

            const pages = f.split(',');
            for (let i = 0; i < pages.length; i++) {
                const [id, ivB64] = pages[i].split(':');
                status.innerText = `Pobieranie strony ${i+1}/${pages.length}...`;
                
                // UŻYWAMY BEZPOŚREDNIEJ DOMENY GOOGLE (bypass CORS/403)
                const url = `https://lh3.googleusercontent.com/d/${id}`;
                
                const res = await fetch(url);
                if (!res.ok) throw new Error("Google Drive odmówił dostępu (Błąd " + res.status + "). Poczekaj minutę i spróbuj ponownie.");
                
                const encryptedData = await res.arrayBuffer();
                const iv = Uint8Array.from(safeAtob(ivB64), c => c.charCodeAt(0));
                
                const decrypted = await crypto.subtle.decrypt(
                    { name: "AES-GCM", iv: iv, tagLength: 128 },
                    key,
                    encryptedData
                );

                const img = document.createElement('img');
                img.src = URL.createObjectURL(new Blob([decrypted], { type: 'image/jpeg' }));
                document.getElementById('content').appendChild(img);
            }
            status.style.display = 'none';
        } catch (e) {
            status.className = 'error';
            status.innerText = "Błąd: " + e.message;
        }
    }
    start();
</script>
</body>
</html>
