<!DOCTYPE html>
<html>
<head>
    <title>Marine Documents - Odbiór</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; width: 100%; text-align: center; }
        .status { padding: 12px; border-radius: 8px; margin: 16px 0; background: #e7f3ff; color: #007bff; font-weight: bold; }
        .error { background: #fff1f0; color: #d32f2f; padding: 12px; border-radius: 8px; border: 1px solid #ffa39e; font-size: 13px; text-align: left; white-space: pre-wrap; }
        img { max-width: 100%; border-radius: 12px; margin-top: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .debug { font-size: 10px; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Marine Documents</h2>
        <div id="status" class="status">Inicjowanie...</div>
        <div id="content"></div>
        <div id="debug" class="debug"></div>
    </div>

<script>
    function safeAtob(s) {
        if (!s) return "";
        s = s.replace(/-/g, '+').replace(/_/g, '/');
        s = s.replace(/[^A-Za-z0-9+/]/g, "");
        while (s.length % 4) s += '=';
        return atob(s);
    }

    async function fetchFile(fileId) {
        const url = `https://drive.google.com/uc?export=download&id=${fileId}`;
        const debug = document.getElementById('debug');
        
        // Lista metod pobierania - od najbardziej bezpośredniej
        const methods = [
            { name: "Direct", url: url },
            { name: "Proxy1", url: `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}` },
            { name: "Proxy2", url: `https://corsproxy.io/?${encodeURIComponent(url)}` }
        ];
        
        let errors = [];
        for (let m of methods) {
            try {
                debug.innerText += `\nPróba ${m.name}... `;
                const res = await fetch(m.url);
                if (res.ok) {
                    debug.innerText += "OK";
                    return await res.arrayBuffer();
                }
                errors.push(`${m.name}: HTTP ${res.status}`);
                debug.innerText += `Błąd ${res.status}`;
            } catch (e) {
                errors.push(`${m.name}: ${e.message}`);
                debug.innerText += "Błąd sieci";
            }
        }
        throw new Error("Nie udało się pobrać pliku.\nSzczegóły:\n" + errors.join("\n"));
    }

    async function start() {
        const status = document.getElementById('status');
        try {
            // Ręczne wyciąganie parametrów z hasha (bezpieczniejsze)
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const k = params.get('k');
            const f = params.get('f');

            if (!k || !f) throw new Error("Brak klucza (k) lub danych plików (f) w linku.");

            const keyRaw = Uint8Array.from(safeAtob(k), c => c.charCodeAt(0));
            const key = await crypto.subtle.importKey("raw", keyRaw, {name: "AES-GCM"}, false, ["decrypt"]);

            const pages = f.split(',');
            for (let i = 0; i < pages.length; i++) {
                const [id, ivB64] = pages[i].split(':');
                status.innerText = `Pobieranie strony ${i+1}/${pages.length}...`;
                
                const encryptedData = await fetchFile(id);
                const iv = Uint8Array.from(safeAtob(ivB64), c => c.charCodeAt(0));
                
                const decrypted = await crypto.subtle.decrypt(
                    { name: "AES-GCM", iv: iv, tagLength: 128 },
                    key,
                    encryptedData
                );

                const img = document.createElement('img');
                img.src = URL.createObjectURL(new Blob([decrypted], { type: 'image/jpeg' }));
                document.getElementById('content').appendChild(img);
            }
            status.style.display = 'none';
        } catch (e) {
            status.className = 'error';
            status.innerText = "Błąd: " + e.message;
        }
    }
    start();
</script>
</body>
</html>
