<!DOCTYPE html> <html> <head> <title>Marine Documents - Odbiór</title> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <style> body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f0f2f5; } .card { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; width: 100%; text-align: center; } .status { padding: 12px; border-radius: 8px; margin: 16px 0; background: #e7f3ff; color: #007bff; font-weight: bold; } .error { background: #fff1f0; color: #d32f2f; padding: 12px; border-radius: 8px; border: 1px solid #ffa39e; white-space: pre-wrap; word-break: break-all; } img { max-width: 100%; border-radius: 12px; margin-top: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); } </style> </head> <body> <div class="card"> <h2>Marine Documents</h2> <div id="status" class="status">Odszyfrowywanie...</div> <div id="content"></div> </div>
<script>
    // Funkcja czyszcząca i naprawiająca Base64
    function safeAtob(s) {
        try {
            // 1. Zamień format URL-Safe na Standard
            s = s.replace(/-/g, '+').replace(/_/g, '/');
            // 2. Usuń wszystko co nie jest znakiem Base64 (spacje, %, itp.)
            s = s.replace(/[^A-Za-z0-9+/]/g, "");
            // 3. Dodaj prawidłowe dopełnienie
            while (s.length % 4) s += '=';
            return atob(s);
        } catch (e) {
            console.error("Błąd dekodowania ciągu:", s);
            throw new Error("Uszkodzony klucz lub dane (Base64 Error).");
        }
    }

    async function fetchWithRetry(url) {
        const proxies = [
            `https://corsproxy.io/?${encodeURIComponent(url)}`,
            `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`
        ];
        for (let proxy of proxies) {
            try {
                const res = await fetch(proxy);
                if (res.ok) return await res.arrayBuffer();
            } catch (e) {}
        }
        throw new Error("Nie udało się pobrać pliku z Google Drive.");
    }

    async function start() {
        const status = document.getElementById('status');
        const content = document.getElementById('content');
        try {
            // Pobierz fragment po # i wyczyść go
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const k = params.get('k');
            const f = params.get('f');

            if (!k || !f) throw new Error("Link jest niekompletny lub uszkodzony.");

            // Przygotuj klucz
            const keyStr = safeAtob(k);
            const keyRaw = Uint8Array.from(keyStr, c => c.charCodeAt(0));
            const key = await crypto.subtle.importKey("raw", keyRaw, {name: "AES-GCM"}, false, ["decrypt"]);

            const pages = f.split(',');
            for (let i = 0; i < pages.length; i++) {
                const [id, ivB64] = pages[i].split(':');
                status.innerText = `Pobieranie strony ${i+1}/${pages.length}...`;
                
                const driveUrl = `https://drive.google.com/uc?export=download&id=${id}`;
                const encryptedData = await fetchWithRetry(driveUrl);
                
                const ivStr = safeAtob(ivB64);
                const iv = Uint8Array.from(ivStr, c => c.charCodeAt(0));
                
                const decrypted = await crypto.subtle.decrypt(
                    { name: "AES-GCM", iv: iv, tagLength: 128 },
                    key,
                    encryptedData
                );

                const blob = new Blob([decrypted], { type: 'image/jpeg' });
                const img = document.createElement('img');
                img.src = URL.createObjectURL(blob);
                content.appendChild(img);
            }
            status.style.display = 'none';
        } catch (e) {
            status.className = 'error';
            status.innerText = "Błąd: " + e.message;
        }
    }
    start();
</script>
</body> </html>
